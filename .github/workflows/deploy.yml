name: Deploy Backend (EC2)

# Builds the Docker image in CI, pushes it to Amazon ECR, then deploys to EC2
# using AWS SSM Run Command (keyless: no SSH key, no inbound port 22). The SSM
# agent on the instance runs docker compose using the instance's IAM role to
# pull from ECR.
#
# Required GitHub secrets (Settings -> Secrets and variables -> Actions):
#   AWS_DEPLOY_ROLE_ARN  arn of the IAM role assumed via OIDC (see .github/DEPLOYMENT.md)
#   EC2_INSTANCE_ID      target instance id (e.g. i-030031e5bd44ee410)
#
# Instance prerequisites: SSM agent running (instance role has
# AmazonSSMManagedInstanceCore + AmazonEC2ContainerRegistryReadOnly), Docker +
# compose plugin installed, and /home/ec2-user/dealio-backend/.env present with
# the production runtime config.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write   # required for AWS OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: dealio-backend
  APP_DIR: /home/ec2-user/dealio-backend

jobs:
  build-and-push:
    name: Build & push image to ECR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.uri }}
      registry: ${{ steps.ecr.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" --region "$AWS_REGION" \
            || aws ecr create-repository --repository-name "$ECR_REPOSITORY" --region "$AWS_REGION"

      - name: Build, tag and push image
        id: image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
          echo "uri=$IMAGE:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to EC2 via SSM
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM Run Command
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          ECR_IMAGE: ${{ needs.build-and-push.outputs.image }}
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.registry }}
        run: |
          set -euo pipefail

          # Build the remote script. The outer (unquoted) heredoc substitutes the
          # image/registry/region from CI; the remote script itself has no shell
          # variables, so nothing needs escaping.
          REMOTE=$(cat <<EOF
          set -euo pipefail
          mkdir -p ${APP_DIR}/uploads
          cd ${APP_DIR}
          cat > docker-compose.yml <<'YAML'
          services:
            app:
              image: ${ECR_IMAGE}
              restart: unless-stopped
              env_file: [.env]
              environment:
                NODE_ENV: production
                PORT: "8090"
              ports: ["8090:8090"]
              volumes: ["./uploads:/app/uploads"]
              logging:
                driver: json-file
                options:
                  max-size: "10m"
                  max-file: "3"
          YAML
          aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
          docker compose pull
          docker compose up -d
          docker compose run --rm app npx prisma db push --skip-generate
          docker image prune -f
          EOF
          )

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy ${GITHUB_SHA::7}" \
            --parameters "$(jq -n --arg c "$REMOTE" '{commands: ($c | split("\n"))}')" \
            --query 'Command.CommandId' --output text)
          echo "SSM command id: $CMD_ID"

          FAILED=0
          for i in $(seq 1 120); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo Pending)
            echo "status: $STATUS"
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut) FAILED=1; break ;;
            esac
            sleep 5
          done

          echo "----- remote stdout -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text || true
          echo "----- remote stderr -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text || true

          if [ "$FAILED" = "1" ]; then echo "Deploy failed"; exit 1; fi
          echo "Deploy succeeded"
